schema_version: "1.0"
task: discovery-responses

# Fixed stage order (plan Execution model). `assemble` is the deterministic,
# run-level finalizer — no persona turn.
stages:
  - associate_draft
  - partner_loop
  - oc_attack
  - bolster
  - judge_panel
  - rubric_gate
  - assemble

# Per-request loop caps (thin mode; plan D6 keeps caps low).
loop_caps:
  associate_partner: 2
  oc: 1
  bolster: 1

panels:
  judges: 3
  jury: false
  # Decorrelated rubric panel at the final gate (plan D6 — stays at N≈3).
  rubric_judges: 3

# Convergence floors (plan D6). A partner loop stops only when the draft stopped
# improving AND stopped changing AND is complete — or the iteration cap is hit.
convergence:
  score_delta_floor: 0.02
  material_change_floor: 0.10
  coverage_floor: 0.80

# Gates evaluated per the D12 execution order. Phase 3 adds the deterministic
# completeness gate (presence criteria) and the LLM-judged rubric gate.
gates:
  - degeneracy
  - completeness
  - rubric

rubric_id: discovery-responses-v1.0
# Final rubric gate passes iff the weighted median composite >= this threshold.
rubric_threshold: 0.75

deliverables:
  - draft-discovery-responses.md
